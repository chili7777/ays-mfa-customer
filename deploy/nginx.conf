server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  location = /index.html {
    add_header Cache-Control "no-store";
  }
  location /api/ {
    proxy_pass https://ays-msa-dm-cuaa-cr-account-stagi-zdpms.ondigitalocean.app/;
    proxy_set_header Host ays-msa-dm-cuaa-cr-account-stagi-zdpms.ondigitalocean.app;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_ssl_server_name on;
  }
  location / {
    try_files $uri $uri/ /index.html;
  }
}
