<div class="container py-4">
  <header class="mb-4 px-2">
    <h1 class="h4 mb-0">{{isEdit ? 'Editar Cliente' : 'Nuevo Cliente'}}</h1>
  </header>

  <div class="surface-alt mx-2">
    <form [formGroup]="customerForm" (ngSubmit)="onSubmit()">
      <div class="row">
        <div class="col-12 col-md-6 mb-4">
          <label class="form-label d-block text-secondary small mb-2">Nombre Completo</label>
          <input type="text" formControlName="name" class="form-control" placeholder="Ej: Juan Pérez">
        </div>

        <div class="col-12 col-md-6 mb-4">
          <label class="form-label d-block text-secondary small mb-2">Identificación</label>
          <input type="text" formControlName="identification" class="form-control" placeholder="Ej: 1712345678">
        </div>

        <div class="col-12 col-md-6 mb-4">
          <label class="form-label d-block text-secondary small mb-2">Email</label>
          <input type="email" formControlName="email" class="form-control" placeholder="juan.perez@example.com">
        </div>

        <div class="col-12 col-md-6 mb-4">
          <label class="form-label d-block text-secondary small mb-2">Teléfono</label>
          <input type="text" formControlName="phone" class="form-control" placeholder="0987654321">
        </div>

        <div class="col-12 mb-4">
          <label class="form-label d-block text-secondary small mb-2">Dirección</label>
          <input type="text" formControlName="address" class="form-control" placeholder="Quito, Ecuador">
        </div>

        <div class="col-12 col-md-6 mb-4">
          <label class="form-label d-block text-secondary small mb-2">Género</label>
          <select formControlName="gender" class="form-control">
            <option value="MALE">Masculino</option>
            <option value="FEMALE">Femenino</option>
            <option value="OTHER">Otro</option>
          </select>
        </div>

        <div class="col-12 col-md-6 mb-4">
          <label class="form-label d-block text-secondary small mb-2">Edad</label>
          <input type="number" formControlName="age" class="form-control" placeholder="18">
        </div>

        <div class="col-12 mb-4" *ngIf="!isEdit">
          <label class="form-label d-block text-secondary small mb-2">Contraseña</label>
          <input type="password" formControlName="password" class="form-control" placeholder="Mínimo 6 caracteres">
        </div>
      </div>

      <div class="mb-4 d-flex align-items-center justify-content-between py-3" style="border-top: 1px solid var(--border-color, rgba(43, 49, 57, 0.5)); border-bottom: 1px solid var(--border-color, rgba(43, 49, 57, 0.5));">
        <div>
          <label for="status" class="form-label mb-0 d-block">Estado del cliente</label>
          <span class="text-secondary small">Define si el cliente está activo en el sistema</span>
        </div>
        <label class="switch">
          <input type="checkbox" id="status" formControlName="status">
          <span class="slider"></span>
        </label>
      </div>

      <div class="mt-5 d-flex gap-3">
        <button type="submit" class="btn btn-lg w-100" [ngClass]="isEdit ? 'btn-warning' : 'btn-success'" [disabled]="customerForm.invalid">
          {{isEdit ? 'Actualizar Cliente' : 'Crear Cliente'}}
        </button>
        <button type="button" class="btn btn-secondary w-100" (click)="goBack()">
          Cancelar
        </button>
      </div>
    </form>
  </div>
</div>
