<div class="container py-4 d-flex justify-content-center align-items-center" style="min-height: 90vh;">
  <div class="w-100 animate-fade-in" style="max-width: 500px;">
    <header class="mb-5 text-center mt-4">
      <div class="d-inline-flex p-3 rounded-circle mb-3" style="color: #f0b90b;">
        <span class="material-icons" style="font-size: 32px;">person_add</span>
      </div>
      <h1 class="h3 mb-2 fw-bold">{{isEdit ? 'Actualizar Información' : 'Registro de Cliente'}}</h1>
      <p class="text-secondary px-4">
        {{
          currentStep === 1 ? 'Paso 1: Información Personal' :
          currentStep === 2 ? 'Paso 2: Contacto y Ubicación' : 'Paso 3: Seguridad y Estado'
        }}
      </p>

      <!-- Progress Indicators -->
      <div class="d-flex gap-2 mt-4 justify-content-center">
        <div *ngFor="let s of [1,2,3]"
             class="stepper-dot"
             [class.active]="s === currentStep"
             [class.completed]="s < currentStep">
        </div>
      </div>
    </header>

    <div class="surface-alt p-4 shadow-sm">
      <form [formGroup]="customerForm" (ngSubmit)="onSubmit()">

        <!-- Step 1: Personal Info -->
        <div *ngIf="currentStep === 1" class="step-content animate-fade-in">
          <div class="mb-4">
            <label class="text-secondary small d-block mb-2">Nombre Completo</label>
            <input type="text" formControlName="name" class="form-control" placeholder="Ej: Juan Pérez">
          </div>

          <div class="mb-4">
            <label class="text-secondary small d-block mb-2">Identificación (Cédula/RUC)</label>
            <input type="text" formControlName="identification" class="form-control" placeholder="Ej: 1712345678">
          </div>

          <div class="row">
            <div class="col-6 mb-4">
              <label class="text-secondary small d-block mb-2">Género</label>
              <select formControlName="gender" class="form-control">
                <option value="MALE">Masculino</option>
                <option value="FEMALE">Femenino</option>
                <option value="OTHER">Otro</option>
              </select>
            </div>
            <div class="col-6 mb-4">
              <label class="text-secondary small d-block mb-2">Edad</label>
              <input type="number" formControlName="age" class="form-control" placeholder="18">
            </div>
          </div>
        </div>

        <!-- Step 2: Contact Info -->
        <div *ngIf="currentStep === 2" class="step-content animate-fade-in">
          <div class="mb-4">
            <label class="text-secondary small d-block mb-2">Correo Electrónico</label>
            <input type="email" formControlName="email" class="form-control" placeholder="juan.perez@example.com">
          </div>

          <div class="mb-4">
            <label class="text-secondary small d-block mb-2">Teléfono de Contacto</label>
            <input type="text" formControlName="phone" class="form-control" placeholder="0987654321">
          </div>

          <div class="mb-4">
            <label class="text-secondary small d-block mb-2">Dirección de Domicilio</label>
            <input type="text" formControlName="address" class="form-control" placeholder="Quito, Ecuador">
          </div>
        </div>

        <!-- Step 3: Security & Status -->
        <div *ngIf="currentStep === 3" class="step-content animate-fade-in">
          <div class="mb-4" *ngIf="!isEdit">
            <label class="text-secondary small d-block mb-2">Contraseña de acceso</label>
            <input type="password" formControlName="password" class="form-control" placeholder="Mínimo 6 caracteres">
          </div>

          <div class="mb-4 d-flex align-items-center justify-content-between py-3 surface-alt px-3 rounded">
            <div>
              <label for="status" class="fw-medium d-block mb-0">Estado Activo</label>
              <span class="text-secondary small">Habilitar acceso inmediato</span>
            </div>
            <label class="switch">
              <input type="checkbox" id="status" formControlName="status">
              <span class="slider"></span>
            </label>
          </div>
        </div>

        <!-- Navigation -->
        <div class="mt-5 d-flex gap-3">
          <button type="button" class="btn btn-secondary flex-grow-1" (click)="currentStep === 1 ? goBack() : prevStep()">
            {{currentStep === 1 ? 'Cancelar' : 'Anterior'}}
          </button>

          <button *ngIf="currentStep < totalSteps" type="button" class="btn btn-primary flex-grow-1" (click)="nextStep()">
            Siguiente
          </button>

          <button *ngIf="currentStep === totalSteps" type="submit" class="btn flex-grow-1" [ngClass]="isEdit ? 'btn-warning' : 'btn-success'" [disabled]="customerForm.invalid">
            {{isEdit ? 'Guardar Cambios' : 'Confirmar Registro'}}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
